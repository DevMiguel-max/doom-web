<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doom Web - WASM Edition</title>
    <style>
        body { 
            background-color: #000; 
            color: #f00; 
            font-family: 'Courier New', Courier, monospace; 
            text-align: center; 
            margin: 0; 
            overflow: hidden; 
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111;
        }
        canvas { 
            max-width: 100%; 
            max-height: 100%; 
            background-color: #000; 
            image-rendering: pixelated; 
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
            outline: none; /* Remove a borda azul quando clica */
        }
        #overlay { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border: 2px solid #555;
            border-radius: 10px;
            z-index: 10;
        }
        h1 {
            font-size: 48px;
            margin-top: 0;
            text-shadow: 2px 2px #5a0000;
        }
        button { 
            padding: 15px 40px; 
            font-size: 20px; 
            background-color: #900; 
            color: #fff; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 5px;
            transition: 0.3s;
        }
        button:hover { 
            background-color: #f00; 
            transform: scale(1.05);
            box-shadow: 0 0 15px #f00;
        }
        .controls {
            margin-top: 20px;
            color: #aaa;
            font-size: 14px;
        }
        
        /* Ocultando os elementos técnicos que o doom.js precisa para não travar */
        #hidden-stats { display: none; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="canvas" tabindex="-1" oncontextmenu="event.preventDefault()"></canvas>
        
        <div id="overlay">
            <h1>DOOM WEB</h1>
            <button id="start-btn">INICIAR JOGO</button>
            <div class="controls">
                <p><strong>Setas / WASD:</strong> Mover</p>
                <p><strong>CTRL:</strong> Atirar | <strong>Espaço:</strong> Abrir Portas</p>
            </div>
            <p id="loading-status" style="color: yellow; display: none;">Carregando arquivos, aguarde...</p>
        </div>
    </div>

    <div id="hidden-stats">
        <div id="output"></div>
        <div id="focushint"></div>
        <div id="animationfps_stats"></div>
        <div id="getmsps_stats"></div>
        <div id="getms_stats"></div>
    </div>

    <script type='text/javascript'>
        var Module = {
            preRun: [
                function() {
                    Module.addRunDependency('carregar_wad');
                    
                    console.log("Baixando o DOOM.WAD...");
                    document.getElementById('loading-status').innerText = "Baixando DOOM.WAD...";
                    document.getElementById('loading-status').style.display = 'block';

                    fetch('DOOM.WAD')
                        .then(function(response) {
                            if (!response.ok) throw new Error("DOOM.WAD não encontrado.");
                            return response.arrayBuffer();
                        })
                        .then(function(buffer) {
                            FS.writeFile('DOOM.WAD', new Uint8Array(buffer));
                            console.log("DOOM.WAD pronto!");
                            document.getElementById('loading-status').innerText = "Iniciando motor gráfico...";
                            Module.removeRunDependency('carregar_wad');
                        })
                        .catch(function(error) {
                            console.error("Erro no WAD:", error);
                            document.getElementById('loading-status').innerText = "Erro: " + error.message;
                            document.getElementById('loading-status').style.color = "red";
                        });
                }
            ],
            postRun: [
                function() {
                    console.log("Motor WASM rodando!");
                    setTimeout(() => {
                        document.getElementById('overlay').style.display = 'none';
                        // Foca automaticamente no canvas para o teclado funcionar de cara
                        document.getElementById('canvas').focus();
                    }, 1000);
                }
            ],
            print: function(text) { console.log(text); },
            printErr: function(text) { console.error(text); },
            canvas: document.getElementById('canvas'),
            arguments: ["-iwad", "DOOM.WAD", "-window"],
            setStatus: function(text) { console.log("Status: " + text); }
        };

        document.getElementById('start-btn').addEventListener('click', function() {
            this.style.display = 'none';
            const script = document.createElement('script');
            script.src = "doom.js"; 
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
