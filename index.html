<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doom Web - WASM Edition</title>
    <style>
        body { 
            background-color: #000; 
            color: #f00; 
            font-family: 'Courier New', Courier, monospace; 
            text-align: center; 
            margin: 0; 
            overflow: hidden; /* Remove as barras de rolagem */
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111;
        }
        canvas { 
            max-width: 100%; 
            max-height: 100%; 
            background-color: #000; 
            image-rendering: pixelated; /* Deixa os gráficos clássicos bem definidos */
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }
        #overlay { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border: 2px solid #555;
            border-radius: 10px;
            z-index: 10;
        }
        h1 {
            font-size: 48px;
            margin-top: 0;
            text-shadow: 2px 2px #5a0000;
        }
        button { 
            padding: 15px 40px; 
            font-size: 20px; 
            background-color: #900; 
            color: #fff; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 5px;
            transition: 0.3s;
        }
        button:hover { 
            background-color: #f00; 
            transform: scale(1.05);
            box-shadow: 0 0 15px #f00;
        }
        .controls {
            margin-top: 20px;
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
        
        <div id="overlay">
            <h1>DOOM WEB</h1>
            <button id="start-btn">INICIAR JOGO</button>
            <div class="controls">
                <p><strong>Setas / WASD:</strong> Mover</p>
                <p><strong>CTRL:</strong> Atirar | <strong>Espaço:</strong> Abrir Portas</p>
            </div>
            <p id="loading-status" style="color: yellow; display: none;">Carregando arquivos, aguarde...</p>
        </div>
    </div>

  <script type='text/javascript'>
    var Module = {
        preRun: [
            function() {
                // 1. Avisa o motor para PAUSAR e não iniciar o jogo ainda
                Module.addRunDependency('carregar_wad');
                
                console.log("Iniciando o download do DOOM.WAD...");
                document.getElementById('loading-status').innerText = "Baixando DOOM.WAD (12MB)...";
                document.getElementById('loading-status').style.display = 'block';

                // 2. Faz o download do arquivo real
                fetch('DOOM.WAD')
                    .then(function(response) {
                        if (!response.ok) throw new Error("DOOM.WAD não encontrado no servidor.");
                        return response.arrayBuffer();
                    })
                    .then(function(buffer) {
                        // 3. Escreve o arquivo na memória virtual do motor
                        FS.writeFile('DOOM.WAD', new Uint8Array(buffer));
                        console.log("DOOM.WAD gravado na memória com sucesso!");
                        
                        document.getElementById('loading-status').innerText = "Iniciando motor gráfico...";
                        
                        // 4. Libera o motor para continuar a inicialização
                        Module.removeRunDependency('carregar_wad');
                    })
                    .catch(function(error) {
                        console.error("Erro fatal:", error);
                        document.getElementById('loading-status').innerText = "Erro: " + error.message;
                        document.getElementById('loading-status').style.color = "red";
                    });
            }
        ],
        postRun: [
            function() {
                console.log("Motor WASM rodando!");
                // Remove o aviso da tela
                setTimeout(() => {
                    document.getElementById('overlay').style.display = 'none';
                }, 1000);
            }
        ],
        print: function(text) { console.log("DOOM: " + text); },
        printErr: function(text) { console.error("DOOM ERRO: " + text); },
        canvas: document.getElementById('canvas'),
        arguments: ["-iwad", "DOOM.WAD", "-window"],
        setStatus: function(text) { console.log("Status: " + text); }
    };

    document.getElementById('start-btn').addEventListener('click', function() {
        this.style.display = 'none';
        
        const script = document.createElement('script');
        script.src = "doom.js"; 
        
        script.onerror = function() {
            document.getElementById('loading-status').innerText = "Erro ao carregar doom.js";
            document.getElementById('loading-status').style.color = "red";
        };

        document.body.appendChild(script);
    });
</script>
</body>
</html>
