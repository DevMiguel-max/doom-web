<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOOM — Miguel Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Black+Han+Sans&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blood:   #c0000c;
      --ember:   #ff4400;
      --ash:     #1a1a1a;
      --smoke:   #111;
      --bone:    #d4c9a8;
      --dim:     #444;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Share Tech Mono', monospace;
      color: var(--bone);
    }

    /* ── SPLASH SCREEN ─────────────────────────────── */
    #splash {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000;
      animation: flicker 8s infinite;
    }
    @keyframes flicker {
      0%,100%  { opacity: 1 }
      92%      { opacity: 1 }
      93%      { opacity: .7 }
      94%      { opacity: 1 }
      97%      { opacity: .85 }
      98%      { opacity: 1 }
    }

    /* scanlines overlay */
    #splash::after {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,.18) 3px,
        rgba(0,0,0,.18) 4px
      );
    }

    .splash-logo {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(5rem, 18vw, 14rem);
      letter-spacing: .08em;
      color: var(--blood);
      text-shadow:
        0 0 30px var(--ember),
        0 0 80px rgba(200,0,0,.5),
        4px 4px 0 #000,
        8px 8px 0 #500;
      line-height: 1;
      user-select: none;
    }

    .splash-sub {
      margin-top: .4em;
      font-size: clamp(.6rem, 1.4vw, .95rem);
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .splash-btn {
      margin-top: 3.5rem;
      padding: .75em 2.5em;
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(.9rem, 2vw, 1.15rem);
      letter-spacing: .25em;
      text-transform: uppercase;
      color: #fff;
      background: var(--blood);
      border: 2px solid var(--ember);
      cursor: pointer;
      position: relative;
      clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
      transition: background .15s, box-shadow .15s;
    }
    .splash-btn:hover {
      background: var(--ember);
      box-shadow: 0 0 24px var(--ember);
    }

    .splash-controls {
      margin-top: 2rem;
      font-size: .75rem;
      letter-spacing: .12em;
      color: #555;
      line-height: 2;
    }
    .splash-controls span { color: #888; }

    /* ── GAME WRAPPER ──────────────────────────────── */
    #game-wrap {
      display: none;   /* shown after splash dismissed */
      flex-direction: column;
      align-items: center;
      width: 100%; height: 100%;
    }
    #game-wrap.active { display: flex; }

    /* The canvas doom.js expects: id="screen" */
    #screen {
      display: block;
      width:  640px;
      height: 400px;
      max-width:  100vw;
      max-height: calc(100vh - 44px);
      image-rendering: pixelated;
      cursor: crosshair;
      outline: none;
      border: 1px solid #1c1c1c;
      background: #000;
    }

    /* ── HUD BAR ───────────────────────────────────── */
    #hud {
      width: 640px;
      max-width: 100vw;
      height: 36px;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 0 .7rem;
      background: var(--ash);
      border-top: 1px solid #2a2a2a;
      font-size: .7rem;
      color: #555;
      flex-shrink: 0;
    }
    .hud-item { display: flex; gap: .3em; align-items: center; }
    .hud-val  { color: var(--ember); }
    #focushint {
      margin-left: auto;
      color: var(--blood);
      font-weight: bold;
      font-size: .65rem;
      letter-spacing: .05em;
    }

    /* ── MOBILE D-PAD ──────────────────────────────── */
    #dpad {
      position: fixed;
      bottom: 1.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .25rem;
      z-index: 50;
    }
    #dpad-left  { left: 1.5rem; }
    #dpad-right { right: 1.5rem; }

    .dpad-row { display: flex; gap: .25rem; }
    .dpad-btn {
      width: 52px; height: 52px;
      background: rgba(30,0,0,.85);
      border: 1px solid var(--blood);
      color: var(--bone);
      font-size: 1.3rem;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: pointer;
    }
    .dpad-btn:active { background: var(--blood); }

    /* ── CONSOLE OUTPUT (hidden, keeps doom.js happy) ── */
    #output { display: none; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════
     SPLASH SCREEN
══════════════════════════════════ -->
<div id="splash">
  <div class="splash-logo">DOOM</div>
  <div class="splash-sub">Miguel Edition &nbsp;·&nbsp; WebAssembly Port</div>
  <button class="splash-btn" id="start-btn">▶ &nbsp;Jogar Agora</button>
  <div class="splash-controls">
    <span>↑ ↓ ← →</span> Mover &nbsp;&nbsp;
    <span>Ctrl</span> Atirar &nbsp;&nbsp;
    <span>Espaço</span> Abrir &nbsp;&nbsp;
    <span>Alt</span> Strafe
  </div>
</div>

<!-- ══════════════════════════════════
     GAME
══════════════════════════════════ -->
<div id="game-wrap">

  <!-- Canvas: doom.js procura por id="screen" -->
  <canvas id="screen" width="640" height="400" tabindex="1"></canvas>

  <!-- HUD com as estatísticas que doom.js atualiza -->
  <div id="hud">
    <div class="hud-item">FPS <span id="fps_stats" class="hud-val">0</span></div>
    <div class="hud-item">Frames <span id="drawframes_stats" class="hud-val">0</span></div>
    <div class="hud-item">Anim <span id="animationfps_stats" class="hud-val">0</span>fps</div>
    <div class="hud-item">getms/s <span id="getmsps_stats" class="hud-val">0</span></div>
    <div class="hud-item">total <span id="getms_stats" class="hud-val">0</span></div>
    <div id="focushint">Clique no canvas para capturar o teclado.</div>
  </div>

  <!-- Controles mobile — esquerda -->
  <div id="dpad" id="dpad-left" style="left:1.5rem">
    <div class="dpad-row">
      <button class="dpad-btn" id="upButton">▲</button>
    </div>
    <div class="dpad-row">
      <button class="dpad-btn" id="leftButton">◀</button>
      <button class="dpad-btn" id="downButton">▼</button>
      <button class="dpad-btn" id="rightButton">▶</button>
    </div>
  </div>

  <!-- Controles mobile — direita -->
  <div id="dpad" id="dpad-right" style="right:1.5rem; bottom:1.2rem; position:fixed; z-index:50; display:flex; flex-direction:column; align-items:center; gap:.25rem;">
    <div class="dpad-row">
      <button class="dpad-btn" id="ctrlButton"  title="Atirar">🔫</button>
      <button class="dpad-btn" id="spaceButton" title="Abrir">🚪</button>
    </div>
    <div class="dpad-row">
      <button class="dpad-btn" id="altButton"   title="Strafe">↔</button>
      <button class="dpad-btn" id="enterButton" title="Enter">↩</button>
    </div>
  </div>

</div>

<!-- Div oculta que doom.js usa para stdout/stderr -->
<div id="output"></div>

<script>
  /* ──────────────────────────────────────────────────
     window.cbl  — interface usada ao final de doom.js
     doom.js chama:
       window.cbl.clearData()
       window.cbl.print("Ready! Click anywhere to play.")
  ────────────────────────────────────────────────── */
  window.cbl = {
    clearData () {
      document.getElementById('output').innerHTML = '';
    },
    print (msg) {
      console.log('[cbl]', msg);
      const hud = document.getElementById('focushint');
      if (hud) hud.innerText = msg;
    }
  };

  /* ──────────────────────────────────────────────────
     Botão JOGAR: esconde splash, mostra game, carrega doom.js
  ────────────────────────────────────────────────── */
  document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('splash').style.display   = 'none';
    document.getElementById('game-wrap').classList.add('active');

    // Pequeno delay para o canvas já estar visível/dimensionado
    setTimeout(() => {
      const s = document.createElement('script');
      s.src = 'doom.js';
      s.onerror = () => console.error('Falha ao carregar doom.js');
      document.body.appendChild(s);
    }, 80);
  });
</script>

</body>
</html>
