<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doom Web - Miguel Edition</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New', monospace; text-align: center; margin: 0; overflow: hidden; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { max-width: 100%; max-height: 100%; background: #000; image-rendering: pixelated; }
        #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 30px; border: 2px solid #555; z-index: 100; }
        button#start-btn { padding: 15px 30px; font-size: 20px; background: #900; color: #fff; border: none; cursor: pointer; }
        
        /* Esconde todos os elementos técnicos que o doom.js exige */
        #tech-layer { display: none; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="canvas" tabindex="-1"></canvas>
        
        <div id="overlay">
            <h1>DOOM WEB</h1>
            <button id="start-btn">JOGAR AGORA</button>
            <p id="loading-status" style="color: yellow; margin-top: 15px; display: none;">Carregando...</p>
        </div>
    </div>

    <div id="tech-layer">
        <div id="output"></div>
        <div id="focushint"></div>
        <div id="animationfps_stats">0</div>
        <div id="getmsps_stats">0</div>
        <div id="getms_stats">0</div>
        <button id="up"></button>
        <button id="down"></button>
        <button id="left"></button>
        <button id="right"></button>
        <button id="shoot"></button>
        <button id="open"></button>
    </div>

    <script type='text/javascript'>
        var Module = {
            preRun: [function() {
                Module.addRunDependency('load_wad');
                fetch('DOOM.WAD').then(r => r.arrayBuffer()).then(b => {
                    FS.writeFile('DOOM.WAD', new Uint8Array(b));
                    Module.removeRunDependency('load_wad');
                });
            }],
            canvas: document.getElementById('canvas'),
            arguments: ["-iwad", "DOOM.WAD", "-window"],
            print: console.log,
            printErr: console.error
        };

        document.getElementById('start-btn').addEventListener('click', function() {
            this.style.display = 'none';
            document.getElementById('loading-status').style.display = 'block';
            
            // Inicia o motor
            const s = document.createElement('script');
            s.src = "doom.js";
            document.body.appendChild(s);

            // Tira o overlay após o motor estabilizar
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('canvas').focus();
            }, 2000);
        });
    </script>
</body>
</html>
